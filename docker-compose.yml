version: "3.8"

services:
  paper-granny:
    build: .
    container_name: paper-granny
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # 持久化生成的论文报告
      - ./papers:/app/papers
      # 本地配置 (可选)
      - ./config.local.yaml:/app/config.local.yaml:ro
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
